<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="FlyID - A secure digital wallet for your travel documents. Scan, store, and manage passports on-device.">
    <meta name="apple-itunes-app" content="app-id=6759621564, app-argument=https://flyid.app/">
    <title>FlyID | Secure Digital Travel Wallet</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main>
        <img src="./app-icon.png" alt="FlyID app icon" class="app-icon">
        <h1 class="headline">Your travel documents,<br><span class="blue">always ready.</span></h1>

        <a href="https://apps.apple.com/us/app/flyid/id6759621564" class="app-store-badge" target="_blank" rel="noopener">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" height="56" aria-hidden="true">
                <rect width="120" height="40" rx="6" fill="#000" />
                <rect x=".5" y=".5" width="119" height="39" rx="5.5" fill="none" stroke="#a6a6a6" />
                <g fill="#fff">
                    <path d="M24.77 20.3a4.95 4.95 0 0 1 2.36-4.15 5.07 5.07 0 0 0-3.99-2.16c-1.68-.18-3.31 1.01-4.17 1.01-.87 0-2.19-.99-3.61-.96a5.31 5.31 0 0 0-4.47 2.73c-1.93 3.34-.49 8.27 1.36 10.97.93 1.33 2.01 2.82 3.43 2.76 1.39-.06 1.91-.88 3.59-.88 1.67 0 2.15.88 3.59.85 1.49-.02 2.42-1.33 3.32-2.67a11 11 0 0 0 1.52-3.09 4.78 4.78 0 0 1-2.93-4.41zM22.04 12.21a4.87 4.87 0 0 0 1.12-3.49 4.96 4.96 0 0 0-3.21 1.66 4.64 4.64 0 0 0-1.15 3.36 4.1 4.1 0 0 0 3.24-1.53z" />
                    <text font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="8" x="36" y="15.5" letter-spacing=".03em">Download on the</text>
                    <text font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" x="36" y="29" letter-spacing=".02em">App Store</text>
                </g>
            </svg>
        </a>

        <div class="carousel-wrapper">
            <button class="arrow" type="button" aria-label="Previous" data-prev>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>

            <div class="phone-frame">
                <div class="phone-screen">
                    <div class="slide-track" data-track>
                        <img src="./Screenshots/1.png" alt="FlyID screenshot 1">
                        <img src="./Screenshots/2.png" alt="FlyID screenshot 2">
                        <img src="./Screenshots/3.png" alt="FlyID screenshot 3">
                        <img src="./Screenshots/4.png" alt="FlyID screenshot 4">
                        <img src="./Screenshots/5.png" alt="FlyID screenshot 5">
                        <img src="./Screenshots/6.png" alt="FlyID screenshot 6">
                    </div>
                </div>
            </div>

            <button class="arrow" type="button" aria-label="Next" data-next>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6" />
                </svg>
            </button>
        </div>

        <div class="dots" aria-label="Slides">
            <button class="dot is-active" type="button" aria-label="Slide 1" data-dot="0"></button>
            <button class="dot" type="button" aria-label="Slide 2" data-dot="1"></button>
            <button class="dot" type="button" aria-label="Slide 3" data-dot="2"></button>
            <button class="dot" type="button" aria-label="Slide 4" data-dot="3"></button>
            <button class="dot" type="button" aria-label="Slide 5" data-dot="4"></button>
            <button class="dot" type="button" aria-label="Slide 6" data-dot="5"></button>
        </div>
    </main>

    <footer>
        <a href="./support.html">FAQ</a>
        <a href="./privacy.html">Privacy Policy</a>
        <a href="mailto:support@flyid.app">Contact</a>
        <span>&copy; 2026 Roy Rhayem</span>
    </footer>

    <script src="./main.js"></script>
</body>

</html>
