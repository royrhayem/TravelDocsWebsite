<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="FlyID Support - Find answers to frequently asked questions about scanning, storing and managing your travel documents.">
    <title>FAQ | FlyID</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.6;
        }

        /* ── Nav ── */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid rgba(0,0,0,0.07);
        }

        .nav-logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: #111;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-back:hover { color: #2e7cf6; }

        .nav-back svg { flex-shrink: 0; }

        /* ── Page header ── */
        .page-header {
            text-align: center;
            padding: 64px 24px 48px;
            border-bottom: 1px solid rgba(0,0,0,0.07);
        }

        .page-header h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .page-header p {
            margin-top: 12px;
            font-size: 1.05rem;
            color: #666;
        }

        /* ── Content ── */
        .content {
            max-width: 680px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── Accordion ── */
        .faq-group {
            margin-bottom: 48px;
        }

        .faq-group-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 16px;
        }

        details {
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        details:first-of-type {
            border-top: 1px solid rgba(0,0,0,0.08);
        }

        summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
            font-size: 1rem;
            font-weight: 600;
            color: #111;
            cursor: pointer;
            list-style: none;
            user-select: none;
        }

        summary::-webkit-details-marker { display: none; }

        .summary-icon {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 400;
            color: #555;
            transition: background 0.2s, transform 0.25s;
        }

        details[open] .summary-icon {
            background: #2e7cf6;
            color: #fff;
            transform: rotate(45deg);
        }

        .faq-answer {
            padding: 0 0 20px;
            color: #555;
            font-size: 0.975rem;
            line-height: 1.75;
        }

        .faq-answer ul {
            margin: 12px 0 0 20px;
        }

        .faq-answer li {
            margin-bottom: 6px;
        }

        /* ── Contact card ── */
        .contact-card {
            margin-top: 16px;
            padding: 40px 32px;
            background: #f5f8ff;
            border-radius: 20px;
            text-align: center;
        }

        .contact-card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .contact-card p {
            margin-top: 8px;
            color: #666;
            font-size: 0.975rem;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            margin-top: 24px;
            padding: 14px 28px;
            background: #111;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 999px;
            transition: background 0.2s, transform 0.2s;
        }

        .contact-btn:hover {
            background: #2e7cf6;
            transform: translateY(-1px);
        }

        /* ── Footer ── */
        footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px 24px 32px;
            border-top: 1px solid rgba(0,0,0,0.08);
            font-size: 0.875rem;
            color: #888;
        }

        footer a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover { color: #2e7cf6; }
    </style>
</head>

<body>

    <nav class="nav">
        <a href="./index.html" class="nav-logo">FlyID</a>
        <a href="./index.html" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Home
        </a>
    </nav>

    <header class="page-header">
        <h1>How can we help?</h1>
        <p>Answers to the most common questions about FlyID.</p>
    </header>

    <main class="content">
        <div id="faq-container"></div>

        <div class="contact-card">
            <h2>Still need help?</h2>
            <p>Our support team usually replies within one business day.</p>
            <a href="mailto:support@flyid.app" class="contact-btn">Email Support</a>
        </div>
    </main>

    <script>
        fetch('./faqs.json')
            .then(r => r.json())
            .then(groups => {
                const container = document.getElementById('faq-container');
                container.innerHTML = groups.map(group => `
                    <div class="faq-group">
                        <p class="faq-group-title">${group.group}</p>
                        ${group.items.map(item => `
                            <details>
                                <summary>
                                    ${item.q}
                                    <span class="summary-icon">+</span>
                                </summary>
                                <div class="faq-answer">
                                    <p>${item.a}</p>
                                    ${item.list ? `<ul>${item.list.map(li => `<li>${li}</li>`).join('')}</ul>` : ''}
                                </div>
                            </details>
                        `).join('')}
                    </div>
                `).join('');
            });
    </script>

    <footer>
        <a href="./support.html">FAQ</a>
        <a href="./privacy.html">Privacy Policy</a>
        <a href="mailto:support@flyid.app">Contact</a>
        <span>&copy; 2026 Roy Rhayem</span>
    </footer>

</body>
</html>
